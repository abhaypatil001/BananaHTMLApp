name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI and dependencies
        run: |
          npm install -g @capacitor/cli@latest
          npm init -y
          npm install @capacitor/core@latest @capacitor/android@latest

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html logo.png splash.png www/

      - name: Init and add Android platform
        run: |
          npx cap init "Banana Hisab" "com.bananahisab.app" --web-dir www
          npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: banana-hisab-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
